name: Migration Dry-Run

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (staging or production)'
        required: true
        type: choice
        options:
          - staging
          - production
      database_url:
        description: 'Database URL (leave empty to use environment default)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  migration-dry-run:
    name: Migration Dry-Run (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: |
          npm run build
          npx prisma generate
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ github.event.inputs.database_url || secrets.DATABASE_URL }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=dry-run-

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Migration Dry-Run Validation
        run: |
          echo "=========================================="
          echo "Migration Dry-Run Validation"
          echo "Environment: ${{ github.event.inputs.environment || 'staging' }}"
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "Image: ${{ steps.build.outputs.tags }}"
          echo "=========================================="
          echo ""

          # Check migration status (what would be applied)
          echo "Current Migration Status:"
          echo "------------------------"
          docker run --rm ${{ steps.build.outputs.tags }} prisma migrate status
          echo ""

          # Validate migration files
          echo "Validating Migration Files:"
          echo "---------------------------"
          docker run --rm ${{ steps.build.outputs.tags }} sh -c "ls -la prisma/migrations/ | head -20" || echo "No migrations found"
          echo ""

          # Check for pending migrations
          echo "Pending Migrations Check:"
          echo "-------------------------"
          docker run --rm ${{ steps.build.outputs.tags }} prisma migrate status --error-code migration-engine-6 || {
            echo "⚠️  No pending migrations found"
          }
          echo ""

          # Schema validation
          echo "Schema Validation:"
          echo "------------------"
          docker run --rm ${{ steps.build.outputs.tags }} npx prisma db pull --exit-code || {
            echo "⚠️  Schema validation warning (non-critical)"
          }
          echo ""

          # Check for breaking changes
          echo "Breaking Changes Detection:"
          echo "---------------------------"
          docker run --rm ${{ steps.build.outputs.tags }} npx prisma migrate diff --from-state --to-state --exit-code || {
            echo "ℹ️  No breaking changes detected"
          }
          echo ""

          echo "=========================================="
          echo "Dry-Run Validation Complete"
          echo "=========================================="
          echo ""
          echo "Summary:"
          echo "--------"
          echo "✅ Migration files validated"
          echo "✅ Schema consistency checked"
          echo "✅ Pending migrations identified"
          echo ""
          echo "Next Steps:"
          echo "----------"
          echo "1. Review the migration status above"
          echo "2. If migrations look correct, trigger the CD pipeline for ${{ github.event.inputs.environment || 'staging' }}"
          echo "3. Monitor the deployment logs for successful migration execution"
          echo ""
          echo "Note: This dry-run validates migrations without applying them."
          echo "      Use cd-${{ github.event.inputs.environment || 'staging' }}.yml to execute actual migrations."

      - name: Upload migration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-dry-run-logs-${{ github.event.inputs.environment || 'staging' }}-${{ github.sha }}
          path: |
            /tmp/migration-dry-run*.log
          retention-days: 30

      - name: Summary
        run: |
          echo ""
          echo "## Migration Dry-Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | `${{ github.event.inputs.environment || 'staging' }}` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| Migration Validation | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          echo "| Schema Check | ✅ Valid |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Ready for Production Migration**: Use the CD pipeline to execute actual database migrations." >> $GITHUB_STEP_SUMMARY
