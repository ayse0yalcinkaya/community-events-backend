name: CD Pipeline (Production)

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build application
        run: |
          npm run build
          npx prisma generate
        env:
          NODE_ENV: production

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=production-{{version}},enable={{is_default_branch}}
            type=raw,value=production-latest,enable={{is_default_branch}}

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_SERVER_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_SSH_PORT || 22 }}
          script: |
            echo "Starting production deployment..."

            # Navigate to application directory
            cd /app/boilerplate

            # Get current container image for rollback
            echo "Backing up current image for rollback..."
            CURRENT_IMAGE=$(docker ps --filter "name=boilerplate-production" --format "{{.Image}}" | head -n 1) || echo "No current image"

            # Pull new image
            echo "Pulling new image: ${{ needs.build.outputs.image-tag }}"
            docker pull ${{ needs.build.outputs.image-tag }}

            # Check for existing migration lock
            if [ -f .migration-lock ]; then
              echo "Migration lock file exists! Another migration might be running."
              echo "Lock file age: $(stat -c %Y .migration-lock 2>/dev/null || stat -f %m .migration-lock 2>/dev/null)"
              echo "Current time: $(date +%s)"
              LOCK_AGE=$(( $(date +%s) - $(stat -c %Y .migration-lock 2>/dev/null || stat -f %m .migration-lock 2>/dev/null) ))
              if [ $LOCK_AGE -gt 1800 ]; then
                echo "Lock file is older than 30 minutes, removing stale lock..."
                rm -f .migration-lock
              else
                echo "Lock file is fresh, aborting deployment to prevent concurrent migrations"
                exit 1
              fi
            fi

            # Create migration lock
            echo "Creating migration lock..."
            echo "$$" > .migration-lock
            echo "Lock created with PID: $$"

            # Run database migrations with detailed logging
            echo "=========================================="
            echo "Starting Database Migration (Production)"
            echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "Image: ${{ needs.build.outputs.image-tag }}"
            echo "Version: ${{ needs.build.outputs.version }}"
            echo "=========================================="
            echo ""
            echo "Migration History Check:"
            docker run --rm ${{ needs.build.outputs.image-tag }} prisma migrate status || true
            echo ""
            echo "Executing migrations..."
            START_TIME=$(date +%s)
            docker run --rm --entrypoint "npx" ${{ needs.build.outputs.image-tag }} prisma migrate deploy || {
              END_TIME=$(date +%s)
              DURATION=$((END_TIME - START_TIME))
              echo ""
              echo "=========================================="
              echo "Migration FAILED (Duration: ${DURATION}s)"
              echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
              echo "=========================================="
              rm -f .migration-lock
              if [ -n "$CURRENT_IMAGE" ]; then
                echo "Rolling back to previous image: $CURRENT_IMAGE"
                docker stop boilerplate-production || true
                docker rm boilerplate-production || true
                docker run -d \
                  --name boilerplate-production \
                  --network boilerplate-network \
                  -p 3000:3000 \
                  --env-file .env.production \
                  $CURRENT_IMAGE
              fi
              exit 1
            }
            END_TIME=$(date +%s)
            DURATION=$((END_TIME - START_TIME))
            echo ""
            echo "=========================================="
            echo "Migration SUCCESSFUL (Duration: ${DURATION}s)"
            echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "=========================================="
            echo ""
            echo "Updated Migration History:"
            docker run --rm ${{ needs.build.outputs.image-tag }} prisma migrate status

            # Remove migration lock
            echo ""
            echo "Removing migration lock..."
            rm -f .migration-lock

            # Stop existing container
            echo "Stopping existing container..."
            docker stop boilerplate-production || true
            docker rm boilerplate-production || true

            # Start new container
            echo "Starting new container..."
            docker run -d \
              --name boilerplate-production \
              --network boilerplate-network \
              -p 3000:3000 \
              --env-file .env.production \
              ${{ needs.build.outputs.image-tag }}

            # Wait for application to start
            echo "Waiting for application to start..."
            sleep 30

            # Health check
            echo "Performing health check..."
            curl -f http://localhost:3000/health || {
              echo "Health check failed!"
              echo "Rolling back to previous image: $CURRENT_IMAGE"
              docker stop boilerplate-production || true
              docker rm boilerplate-production || true
              if [ -n "$CURRENT_IMAGE" ]; then
                docker run -d \
                  --name boilerplate-production \
                  --network boilerplate-network \
                  -p 3000:3000 \
                  --env-file .env.production \
                  $CURRENT_IMAGE
              fi
              docker logs boilerplate-production
              exit 1
            }

            echo "Deployment successful!"
            echo "Container: boilerplate-production"
            echo "Image: ${{ needs.build.outputs.image-tag }}"
            echo "Status: Running on port 3000"

      - name: Verify Deployment
        run: |
          echo "Waiting for health endpoint to be ready..."
          for i in {1..30}; do
            if curl -sf http://${{ secrets.PRODUCTION_SERVER_HOST }}:3000/health > /dev/null 2>&1; then
              echo "✅ Application is healthy!"
              curl http://${{ secrets.PRODUCTION_SERVER_HOST }}:3000/health
              exit 0
            fi
            echo "Attempt $i/30 - Waiting for application to be ready..."
            sleep 10
          done
          echo "❌ Health check failed after 30 attempts"
          exit 1
